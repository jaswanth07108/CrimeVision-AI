<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CrimeVision AI - Reports</title>

<link rel="stylesheet" href="index.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

.search-section{
display:flex;
gap:15px;
margin:25px 0;
flex-wrap:wrap;
}

.search-section input{

flex:1;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;

}

.search-section button{

padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
background:#2563eb;
color:white;

}

.search-section button:hover{

background:#1d4ed8;

}

.add-btn{

background:#16a34a !important;

}

.export-btn{

background:#f59e0b !important;

}

.print-btn{

background:#7c3aed !important;

}

.modal{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);

}

.modal-content{

background:white;
width:500px;
margin:80px auto;
padding:25px;
border-radius:12px;

}

.modal-content input,
.modal-content select{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;

}

.modal-content button{

padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;

}

.save-btn{

background:#2563eb;
color:white;

}

.close-btn{

background:red;
color:white;

}

.action-btn{

padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
margin-right:5px;

}

.edit-btn{

background:#2563eb;
color:white;

}

.delete-btn{

background:#dc2626;
color:white;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>

<i class="fa-solid fa-shield-halved"></i>

CrimeAI

</h2>

<ul>

<li onclick="location.href='index.html'">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</li>

<li onclick="location.href='analytics.html'">

<i class="fa-solid fa-chart-pie"></i>

Analytics

</li>

<li class="active">

<i class="fa-solid fa-file-lines"></i>

Reports

</li>

<li onclick="location.href='profile.html'">

<i class="fa-solid fa-user"></i>

Profile

</li>

<li onclick="location.href='settings.html'">

<i class="fa-solid fa-gear"></i>

Settings

</li>

</ul>

</div>

<div class="main">

<header>

<h1>Crime Reports</h1>

<div class="profile">

<i class="fa-solid fa-user-circle"></i>

Admin

</div>

</header>

<div class="search-section">

<input
type="text"
id="searchBox"
placeholder="Search by Crime Type or Location...">

<button onclick="searchReports()">

<i class="fa-solid fa-magnifying-glass"></i>

Search

</button>

<button
class="add-btn"
onclick="openModal()">

<i class="fa-solid fa-plus"></i>

Add Report

</button>

<button
class="export-btn"
onclick="exportCSV()">

<i class="fa-solid fa-file-csv"></i>

Export CSV

</button>

<button
class="print-btn"
onclick="window.print()">

<i class="fa-solid fa-print"></i>

Print

</button>

</div>

<div class="reports">

<table id="reportsTable">

<thead>

<tr>

<th>ID</th>

<th>Crime</th>

<th>Location</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody>

<!-- Filled by JavaScript -->

</tbody>

</table>

</div>

<!-- Add Report Modal -->

<div
class="modal"
id="reportModal">

<div class="modal-content">

<h2>Add Crime Report</h2>

<input
type="number"
id="crimeId"
placeholder="Crime ID">

<input
type="text"
id="crimeType"
placeholder="Crime Type">

<input
type="text"
id="crimeLocation"
placeholder="Location">

<select id="crimeStatus">

<option>Solved</option>

<option>Pending</option>

</select>

<button
class="save-btn"
onclick="saveReport()">

Save Report

</button>

<button
class="close-btn"
onclick="closeModal()">

Close

</button>

</div>

</div>
